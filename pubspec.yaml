name: vidbee_flutter
description: "VidBee - 从全球几乎任何网站下载视频的 Android 应用"
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI 组件
  cupertino_icons: ^1.0.8
  material_color_utilities: ^0.13.0

  # 状态管理
  provider: ^6.1.2
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # 数据库
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.1

  # 网络和下载
  http: ^1.3.0
  dio: ^5.8.0+1
  cached_network_image: ^3.4.1



  # 权限管理
  permission_handler: ^11.3.1

  # 国际化
  intl: ^0.20.2

  # 工具库
  uuid: ^4.5.1
  file_picker: ^9.0.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  device_info_plus: ^11.3.3
  xml: ^6.5.0
  shared_preferences: ^2.3.5

  # 事件总线
  event_bus: ^2.0.1
  # yt-dlp 视频下载引擎
  extractor: ^1.0.0
  # WebView 用于登录
  webview_flutter: ^4.10.0
  # 本地通知
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.25.0
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "../VidBee/apps/docs/public/icon-512.png"
